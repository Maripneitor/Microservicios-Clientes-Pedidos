version: '3.8'

services:
  db_clients:
    image: mysql:8.0
    container_name: db_clients
    environment:
      MYSQL_DATABASE: clients_db
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: user_clients
      MYSQL_PASSWORD: password_clients
    ports:
      - "3307:3306"
    volumes:
      - db_clients_data:/var/lib/mysql

  db_orders:
    image: postgres:15
    container_name: db_orders
    environment:
      POSTGRES_DB: orders_db
      POSTGRES_USER: user_orders
      POSTGRES_PASSWORD: password_orders
    ports:
      - "5433:5432"
    volumes:
      - db_orders_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  clients_service:
    build: ./clients_service
    container_name: clients_service
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: mysql+pymysql://user_clients:password_clients@db_clients:3306/clients_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      - db_clients
      - rabbitmq

  orders_service:
    build: ./orders_service
    container_name: orders_service
    ports:
      - "8002:8000"
    environment:
      DATABASE_URL: postgresql://user_orders:password_orders@db_orders:5432/orders_db
      CLIENTS_SERVICE_URL: http://clients_service:8000
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      - db_orders
      - rabbitmq

volumes:
  db_clients_data:
  db_orders_data:
